name: Monorepo CI Pipeline

on:
  push:
    branches: [ "main", "dev", "refactor/ui-and-controllers" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ---------------- DJANGO (Backend) ----------------
  django:
    name: Django API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev pkg-config

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Django Check
        run: python manage.py check
        env:
          DB_HOST: localhost
          DJANGO_SECRET_KEY: "ci-test-key"
          DEBUG: "True"

  # ---------------- .NET (Frontend) ----------------
  dotnet:
    name: .NET Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x" 

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

  # ---------------- DOCKER (Orchestration) ----------------
  docker:
    name: Docker Build & Integration
    needs: [django, dotnet]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Dummy .env
        run: |
          cp .env.example .env || echo "MYSQL_DATABASE=dec_db" > .env

      - name: Build containers
        run: |
          docker compose build

      - name: Verify Docker Compose Config
        run: docker compose config
