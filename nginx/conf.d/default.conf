server {
    listen 80;
    server_name dec-plataforma.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dec-plataforma.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/dec-plataforma.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dec-plataforma.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://frontend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(api|admin|static/admin|static/rest_framework) {
        proxy_pass http://calculation-engine:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
