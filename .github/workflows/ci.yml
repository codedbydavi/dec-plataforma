name: Monorepo CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ---------------- DJANGO ----------------
  django:
    name: Django API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Django Check
        run: |
          python manage.py check || echo "Django ainda não configurado"

      - name: Django Tests
        run: |
          python manage.py test || echo "Sem testes Django"


  # ---------------- MICROSERVIÇO ----------------
  python-service:
    name: Python Microservice
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: service

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Testes Microserviço
        run: |
          python -m unittest discover || echo "Sem testes no microserviço"


  # ---------------- .NET ----------------
  dotnet:
    name: .NET Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "7.0"

      - name: Restore
        run: dotnet restore || echo "Projeto .NET ainda não configurado"

      - name: Build
        run: dotnet build --no-restore || echo "Build não disponível"

      - name: Test
        run: dotnet test --no-build || echo "Sem testes .NET"


  # ---------------- DOCKER ----------------
  docker:
    name: Docker Build & Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build containers
        run: |
          docker-compose build || echo "docker-compose ainda não configurado"

      - name: Run containers
        run: |
          docker-compose up -d || echo "Containers não iniciados"

      - name: Verificar containers ativos
        run: |
          docker ps

      - name: Testar endpoint (opcional)
        run: |
          sleep 10
          curl http://localhost || echo "Aplicação ainda não responde"

      - name: Shutdown containers
        run: |
          docker-compose down || echo "Nada para desligar"
