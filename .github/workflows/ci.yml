name: Monorepo CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ---------------- DJANGO (Backend) ----------------
  django:
    name: Django API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        # Required for mysqlclient (Python) on Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev pkg-config

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Django Check
        # We use an environment variable to prevent connection errors during the check
        run: python manage.py check
        env:
          DB_HOST: localhost

  # ---------------- MICROSERVICE ----------------
  python-service:
    name: Python Microservice
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Microservice Tests
        run: python -m unittest discover

  # ---------------- .NET (Frontend) ----------------
  dotnet:
    name: .NET Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          # Updated to match project version (10.0 or 8.0)
          dotnet-version: "8.0.x" 

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

  # ---------------- DOCKER (Orchestration) ----------------
  # This job only runs if the previous ones pass
  docker:
    name: Docker Build & Integration
    needs: [django, python-service, dotnet]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Dummy .env
        # Docker Compose needs variables to exist even in CI
        run: |
          cp .env.example .env

      - name: Build and Run containers
        run: |
          docker compose build
          docker compose up -d

      - name: Verify containers
        run: docker ps

      - name: Shutdown containers
        run: docker compose down
